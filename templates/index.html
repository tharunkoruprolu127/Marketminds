{% extends "base.html" %}
{% block content %}

<div class="card-grid">
    <div class="card">
        <h2>Campaign Generator</h2>
        <form action="/campaign" method="post">
            <input type="text" name="product" placeholder="Product Name" required>
            <input type="text" name="target" placeholder="Target Audience" required>
            <button type="submit">Generate</button>
        </form>
    </div>

    <div class="card">
        <h2>Sales Pitch</h2>
        <form action="/pitch" method="post">
            <input type="text" name="product" placeholder="Product Name" required>
            <input type="text" name="audience" placeholder="Audience" required>
            <button type="submit">Create Pitch</button>
        </form>
    </div>

    <div class="card">
        <h2>Lead Scoring</h2>
        <form action="/lead" method="post">
            <input type="text" name="industry" placeholder="Industry" required>
            <input type="text" name="behavior" placeholder="Lead Behavior" required>
            <button type="submit">Analyze</button>
        </form>
    </div>

    <div class="card">
        <h2>Market Insights</h2>
        <form action="/insights" method="post">
            <input type="text" name="market" placeholder="Market Sector" required>
            <button type="submit">Analyze Market</button>
        </form>
    </div>
</div>

{% endblock %}
